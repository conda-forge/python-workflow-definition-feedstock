schema_version: 1

context:
  name: python-workflow-definition
  version: "0.1.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/python_workflow_definition-${{ version }}.tar.gz
  sha256: 0915d0a0383744fb1c35a159c7fe6b664b1d5cf93b781c2f34f2d224e94310fc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.21
    - pydantic >=2.7.0,<2.13.0

tests:
  - python:
      imports:
        - python_workflow_definition
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Python Workflow Definition - workflow interoperability for aiida, jobflow and pyiron
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: http://pythonworkflow.github.io

extra:
  recipe-maintainers:
    - jan-janssen
